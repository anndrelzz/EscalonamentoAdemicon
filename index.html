<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Alavancagem - Ademicon Joinville</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #330000 100%);
            background-attachment: fixed;
            color: #eee;
            min-height: 100vh;
            padding: 15px;
        }

        .main-container {
            max-width: 1000px;
            margin: auto;
            background-color: rgba(20, 20, 20, 0.85);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            border: 1px solid #440000;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid #880000;
            padding-bottom: 10px;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; fill: #ff3333; }
        .logo-text { font-weight: bold; font-size: 1.4em; color: #fff; letter-spacing: 1px; }
        .sub-text { color: #ccc; font-size: 0.8em; text-transform: uppercase; font-weight: bold; }

        h1.main-title {
            color: #ff3333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8em;
            text-transform: uppercase;
        }

        .fase-card {
            background: rgba(40, 40, 40, 0.4);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .fase-title { color: #ff3333; font-weight: bold; margin-bottom: 10px; font-size: 1.1em; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th { background: #2a2a2a; color: #fff; font-size: 0.75em; text-transform: uppercase; padding: 10px; text-align: left; border: 1px solid #444; }
        td { padding: 12px 10px; border: 1px solid #333; font-size: 1em; }

        .liquido-container {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .liquido-label { font-size: 0.95em; color: #eee; }

        /* FUNDO PRETO, TEXTO BRANCO E SEM NEGRITO NO SITE */
        .net-value-input { 
            background: #000; 
            border: 1px solid #ff3333; 
            color: #fff; 
            padding: 10px 15px; 
            border-radius: 4px; 
            width: 100%; 
            text-align: right; 
            font-weight: 400; 
            font-size: 1.1em; 
        }

        .input-section {
            background: rgba(40, 40, 40, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #555;
            margin-bottom: 20px;
            display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;
        }

        .input-field { flex: 1; min-width: 180px; }
        .input-field label { display: block; margin-bottom: 5px; font-size: 0.85em; color: #bbb; }
        input[type="number"] { width: 100%; padding: 10px; background: #111; border: 1px solid #444; border-radius: 6px; color: #fff; }

        .summary-card { background: linear-gradient(180deg, #222 0%, #111 100%); border: 2px solid #880000; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .summary-card h3 { color: #ff3333; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .summary-flex { display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; }
        .summary-item { flex: 1; min-width: 150px; }
        .summary-item label { font-size: 0.85em; color: #aaa; display: block; margin-bottom: 4px; }
        .summary-item span { font-size: 1.4em; font-weight: bold; color: #fff; }

        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.85em; }
        .btn-primary { background: #cc0000; color: #fff; }
        .btn-add { background: #28a745; color: white; }
        .btn-remove { background: #666; color: white; margin-left: 5px; }
        .btn-outline { background: transparent; border: 1px solid #555; color: #ccc; margin-top: 15px; }

        .hidden { display: none !important; }
        .footer-pdf { display: none; }

        @media print {
            @page { size: A4; margin: 1cm 1cm 4cm 1cm; }
            body { background: white; color: black; padding: 0; font-size: 10pt; }
            .main-container { max-width: 100%; border: none; box-shadow: none; background: white; padding: 0; }
            .no-print, .btn, .input-section { display: none !important; }
            .header { border-bottom: 2px solid #000; color: black; margin-bottom: 10px; }
            .logo-icon { fill: black; height: 35px; width: 35px; }
            .logo-text, .sub-text, h1.main-title { color: black !important; }

            .fase-card { background: white; border: none; border-bottom: 1px solid #ccc; padding: 5px 0; margin-bottom: 5px; page-break-inside: avoid; }
            .fase-title { color: black !important; font-size: 1em; }
            table { border: 1px solid black; }
            th { background: #f0f0f0 !important; color: black !important; border: 1px solid black; font-weight: bold; padding: 5px; font-size: 9pt; }
            td { border: 1px solid black; color: black; padding: 5px; font-size: 10pt; }
            
            /* NEGRITO MANTIDO APENAS NO PDF */
            .liquido-label { color: black !important; font-weight: bold; font-size: 9pt; }
            .net-value-input { 
                border: 1px solid #000; 
                background: #f9f9f9; 
                color: #000 !important; 
                text-align: right; 
                width: 100%; 
                font-size: 10pt; 
                padding: 3px 8px; 
                font-weight: 900 !important;
            }

            .summary-card { border: 1px solid black; background: white; color: black; margin-top: 15px; padding: 10px; page-break-inside: avoid; }
            .summary-card h3 { font-size: 1.1em; border-bottom: 1px solid #000; }
            .summary-item span { color: black !important; font-size: 1.2em; }
            .summary-item label { color: #555 !important; font-size: 9pt; }

            .footer-pdf { 
                display: block; position: fixed; bottom: 0; left: 0; width: 100%; background: white; 
                text-align: right; padding-bottom: 30px; 
            }
            .footer-line { border-top: 2px solid #cc0000; width: 100%; margin-bottom: 10px; }
            .manager-container { border-right: 3px solid #cc0000; padding-right: 15px; display: inline-block; }
            .manager-name { font-weight: bold; font-size: 11pt; color: #000; }
            .manager-title, .manager-units, .manager-phone { font-weight: bold; font-size: 10pt; color: #000; margin-top: 2px; }
            .manager-email { color: #0056b3; text-decoration: underline; font-size: 9pt; margin-top: 2px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <div class="logo-area">
            <svg class="logo-icon" viewBox="0 0 24 24"><path d="M16,6V4H8V6H2V8H4V20H20V8H22V6H16M10,6H14V6H10V6M18,18H6V8H18V18M15,10H17V12H15V10M15,13H17V15H15V13M12,10H14V12H12V10M12,13H14V15H12V13M9,10H11V12H9V10M9,13H11V15H9V13M12,16H17V17H12V16Z" /></svg>
            <span class="logo-text">ADEMICON</span>
        </div>
        <div class="sub-text">Joinville - Simulação Financeira</div>
    </div>

    <h1 class="main-title">PROJETO ALAVANCAGEM DE CRÉDITO</h1>

    <div class="input-section" id="setupSection">
        <div class="input-field">
            <label>Crédito 1ª Fase (R$):</label>
            <input type="number" id="initCredit" value="700000">
        </div>
        <div class="input-field">
            <label>Prazo Médio (Meses):</label>
            <input type="number" id="initTerm" value="190">
        </div>
        <button class="btn btn-primary" onclick="iniciarSimulacao()">Gerar Proposta</button>
    </div>

    <div id="dashboard" class="content-layout hidden">
        <div id="fasesContainer"></div>
        
        <div class="input-section no-print">
            <input type="number" id="manualCredit" placeholder="Próximo Crédito (Ex: 1400000)" style="flex: 1; padding: 10px; background: #111; color: #fff; border: 1px solid #444; border-radius: 6px;">
            <button class="btn btn-add" onclick="adicionarFaseManual()">+ Incluir Fase</button>
            <button class="btn btn-remove" onclick="removerUltimaFase()">Remover Última</button>
        </div>

        <div class="summary-card">
            <h3>RESUMO DA OPERAÇÃO</h3>
            <p style="font-size: 0.75em; margin-bottom: 10px; color: #aaa;">C.F. por tranche 1% a.m. + INCC a.a</p>
            <div class="summary-flex">
                <div class="summary-item"><label>Créditos Líquido:</label><span id="totalCredit">R$ 0,00</span></div>
                <div class="summary-item"><label>Valor da Parcela:</label><span id="totalInstallment" style="color: #ff3333;">R$ 0,00</span></div>
                <div class="summary-item"><label>Total de Taxas:</label><span id="totalFees">R$ 0,00</span></div>
                <div class="no-print"><button class="btn btn-primary" onclick="window.print()">Imprimir PDF</button></div>
            </div>
        </div>

        <div class="footer-pdf">
            <div class="footer-line"></div>
            <div class="manager-container">
                <div class="manager-name">Anderson L. Marini</div>
                <div class="manager-title">Sócio gerente</div>
                <div class="manager-units">Unidade Joinville - América | Unidade SP - Jardins</div>
                <div class="manager-phone">(41) 98802-8545</div>
                <div class="manager-email">anderson.marini@licenciadoademicon.com.br</div>
            </div>
        </div>
    </div>
</div>

<script>
    let fases = [];
    const taxaJuros = 0.01; const percentualTaxa = 0.0075;
    function formatarMoeda(valor) { return valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function calcularPMT(pv, n, i) { return pv > 0 ? pv * (i / (1 - Math.pow(1 + i, -n))) : 0; }
    
    function iniciarSimulacao() {
        fases = [];
        const credito = parseFloat(document.getElementById('initCredit').value);
        adicionarFaseDados(credito, parseInt(document.getElementById('initTerm').value));
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('setupSection').classList.add('hidden');
    }

    function adicionarFaseManual() {
        const nc = parseFloat(document.getElementById('manualCredit').value);
        if(!isNaN(nc)){ adicionarFaseDados(nc, fases[0].prazo); document.getElementById('manualCredit').value = ''; }
    }

    function removerUltimaFase() { if(fases.length > 1) { fases.pop(); renderizarFases(); } }

    function adicionarFaseDados(credito, prazo) {
        const entrada = credito * 0.50;
        const pmt = calcularPMT(credito - entrada, prazo, taxaJuros);
        fases.push({ numero: fases.length + 1, credito: credito, entrada: entrada, parcela: pmt, taxa: credito * percentualTaxa, liquido: credito - entrada, prazo: prazo });
        renderizarFases();
    }

    function renderizarFases() {
        const container = document.getElementById('fasesContainer'); container.innerHTML = '';
        let somaLiquidoResumo = 0, somaParcelas = 0, somaTaxas = 0;

        fases.forEach((f, index) => {
            somaLiquidoResumo += f.liquido; somaParcelas += f.parcela; somaTaxas += f.taxa;

            const card = document.createElement('div'); card.className = 'fase-card';
            card.innerHTML = `<div class="fase-title">${f.numero}°Fase</div>
                <table><thead><tr><th>Créditos</th><th>Entrada</th><th>Prazo</th><th>Parcela</th><th>Taxa Transf.</th></tr></thead>
                <tbody><tr><td>R$ ${formatarMoeda(f.credito)}</td><td>R$ ${formatarMoeda(f.entrada)}</td><td>${f.prazo}</td><td>R$ ${formatarMoeda(f.parcela)}</td><td>R$ ${formatarMoeda(f.taxa)}</td></tr></tbody></table>
                <div class="liquido-container">
                    <span class="liquido-label">*Valor liquido para utilizar R$</span>
                    <input type="text" class="net-value-input" value="${formatarMoeda(f.liquido)}" onchange="atualizarLiquido(${index}, this.value)">
                </div>`;
            container.appendChild(card);
        });

        document.getElementById('totalCredit').innerText = "R$ " + formatarMoeda(somaLiquidoResumo);
        document.getElementById('totalInstallment').innerText = "R$ " + formatarMoeda(somaParcelas);
        document.getElementById('totalFees').innerText = "R$ " + formatarMoeda(somaTaxas);
    }

    function atualizarLiquido(index, valor) {
        const num = parseFloat(valor.replace(/\./g, '').replace(',', '.'));
        if (!isNaN(num)) { fases[index].liquido = num; }
        renderizarFases();
    }

    function resetar() { location.reload(); }
</script>

</body>
</html>
