<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Alavancagem - Ademicon Joinville</title>
    
    <link rel="icon" type="image/svg+xml" href="assets/logo-fundo.svg">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { height: 100%; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #330000 100%);
            background-attachment: fixed;
            color: #eee;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .main-container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            background-color: rgba(20, 20, 20, 0.85);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            border: 1px solid #440000;
            flex: 1 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid #880000;
            padding-bottom: 10px;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 40px; width: auto; display: block; }
        .logo-text { font-weight: bold; font-size: 1.6em; color: #fff; letter-spacing: 1px; }
        .sub-text { color: #ccc; font-size: 0.8em; text-transform: uppercase; font-weight: bold; }

        h1.main-title {
            color: #ff3333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8em;
            text-transform: uppercase;
        }

        .fase-card {
            background: rgba(40, 40, 40, 0.4);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .fase-title { color: #ff3333; font-weight: bold; margin-bottom: 10px; font-size: 1.1em; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th { background: #2a2a2a; color: #fff; font-size: 0.75em; text-transform: uppercase; padding: 10px; text-align: left; border: 1px solid #444; }
        td { padding: 12px 10px; border: 1px solid #333; font-size: 1em; }

        .liquido-container { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .liquido-label { font-size: 0.95em; color: #eee; }

        .net-value-input { 
            background: #000; 
            border: 1px solid #ff3333; 
            color: #fff; 
            padding: 10px 15px; 
            border-radius: 4px; 
            width: 100%; 
            text-align: right; 
            font-weight: 400; 
            font-size: 1.1em; 
        }

        .input-section {
            background: rgba(40, 40, 40, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #555;
            margin-bottom: 20px;
            display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;
        }

        .input-field { flex: 1; min-width: 180px; }
        .input-field label { display: block; margin-bottom: 5px; font-size: 0.85em; color: #bbb; }
        input[type="number"] { width: 100%; padding: 10px; background: #111; border: 1px solid #444; border-radius: 6px; color: #fff; }

        .summary-card { background: linear-gradient(180deg, #222 0%, #111 100%); border: 2px solid #880000; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .summary-card h3 { color: #ff3333; margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .summary-info-text { font-size: 0.85em; color: #aaa; margin-bottom: 15px; }
        .summary-flex { display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; }
        .summary-item { flex: 1; min-width: 150px; }
        .summary-item label { font-size: 0.85em; color: #aaa; display: block; margin-bottom: 4px; }
        .summary-item span { font-size: 1.4em; font-weight: bold; color: #fff; }

        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.85em; }
        .btn-primary { background: #cc0000; color: #fff; }
        .btn-add { background: #28a745; color: white; }
        .btn-remove { background: #666; color: white; margin-left: 5px; }

        .hidden { display: none !important; }

        .footer-pdf {
            flex-shrink: 0;
            width: 100%;
            max-width: 1000px;
            margin: 40px auto 10px;
            text-align: right;
            padding: 0 25px;
        }

        @media print {
            @page { size: A4; margin: 1.5cm; }
            body { background: white !important; color: #990000 !important; padding: 0; display: flex; flex-direction: column; height: 100%; }
            
            .main-container { max-width: 100%; border: none; box-shadow: none; background: white !important; padding: 0; flex: 1 0 auto; display: block; color: #990000 !important; }
            
            .no-print, .btn, .input-section { display: none !important; }
            .header { border-bottom: 2px solid #000; margin-bottom: 10px; }
            .logo-img { filter: grayscale(1) brightness(0); height: 35px; }
            
            .logo-text, .sub-text, h1.main-title, .fase-title, .summary-card h3, th, .liquido-label, label { color: #990000 !important; }
            
            /* REGRA PARA A FRASE ESPECÍFICA NO PDF */
            .summary-info-text { color: #000 !important; font-weight: bold; }

            .fase-card { background: white !important; border: none; border-bottom: 1px solid #ccc; padding: 10px 0; margin-bottom: 5px; page-break-inside: avoid; }
            table { border: 1px solid black; width: 100%; }
            th { background: #f0f0f0 !important; border: 1px solid black; padding: 5px; }
            
            td { border: 1px solid black; color: #000 !important; padding: 5px; font-weight: bold; }
            
            .net-value-input { border: 1px solid #000; background: #f9f9f9 !important; color: #000 !important; text-align: right; width: 100%; font-weight: 900 !important; }

            .summary-card { border: 1px solid black; background: white !important; margin-top: 15px; padding: 10px; page-break-inside: avoid; }
            
            .summary-item span { color: #000 !important; }

            .footer-pdf { display: block !important; margin-top: auto; padding-top: 50px; background: white !important; }
            .footer-line { border-top: 2px solid #cc0000; width: 100%; margin-bottom: 10px; }
            .manager-container { border-right: 3px solid #cc0000; padding-right: 15px; display: inline-block; color: #990000 !important; }
            .manager-name { font-weight: bold; color: #000 !important; }
            .manager-email { color: #0056b3 !important; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <div class="logo-area">
            <img class="logo-img" src="assets/logo-fundo.svg" alt="Logo">
            <span class="logo-text">ADEMICON</span>
        </div>
        <div class="sub-text">Joinville - Simulação Financeira</div>
    </div>

    <h1 class="main-title">PROJETO ALAVANCAGEM DE CRÉDITO</h1>

    <div class="input-section" id="setupSection">
        <div class="input-field">
            <label>Crédito 1ª Fase (R$):</label>
            <input type="number" id="initCredit" value="700000">
        </div>
        <div class="input-field">
            <label>Prazo Médio (Meses):</label>
            <input type="number" id="initTerm" value="190">
        </div>
        <button class="btn btn-primary" onclick="iniciarSimulacao()">Gerar Proposta</button>
    </div>

    <div id="dashboard" class="content-layout hidden">
        <div id="fasesContainer"></div>
        <div class="input-section no-print">
            <input type="number" id="manualCredit" placeholder="Próximo Crédito (Ex: 1400000)" style="flex: 1; padding: 10px; background: #111; color: #fff; border: 1px solid #444; border-radius: 6px;">
            <button class="btn btn-add" onclick="adicionarFaseManual()">+ Incluir Fase</button>
            <button class="btn btn-remove" onclick="removerUltimaFase()">Remover Última</button>
        </div>

        <div class="summary-card">
            <h3>RESUMO DA OPERAÇÃO</h3>
            <div class="summary-info-text">C.F. por tranche 1% a.m. + INCC a.a</div>
            <div class="summary-flex">
                <div class="summary-item"><label>Créditos Líquido:</label><span id="totalCredit">R$ 0,00</span></div>
                <div class="summary-item"><label>Valor da Parcela:</label><span id="totalInstallment">R$ 0,00</span></div>
                <div class="summary-item"><label>Total de Taxas:</label><span id="totalFees">R$ 0,00</span></div>
                <div class="no-print"><button class="btn btn-primary" onclick="window.print()">Imprimir PDF</button></div>
            </div>
        </div>
    </div>
</div>

<div class="footer-pdf hidden" id="footerAssinatura">
    <div class="footer-line"></div>
    <div class="manager-container">
        <div class="manager-name">Anderson L. Marini</div>
        <div class="manager-title">Sócio gerente</div>
        <div class="manager-units">Unidade Joinville - América | Unidade SP - Jardins</div>
        <div class="manager-phone">(41) 98802-8545</div>
        <div class="manager-email">anderson.marini@licenciadoademicon.com.br</div>
    </div>
</div>

<script>
    let fases = [];
    const taxaJuros = 0.01; const percentualTaxa = 0.0075;
    function formatarMoeda(v) { return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function calcularPMT(pv, n, i) { return pv > 0 ? pv * (i / (1 - Math.pow(1 + i, -n))) : 0; }
    
    function iniciarSimulacao() {
        fases = [];
        adicionarFaseDados(parseFloat(document.getElementById('initCredit').value), parseInt(document.getElementById('initTerm').value));
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('setupSection').classList.add('hidden');
        document.getElementById('footerAssinatura').classList.remove('hidden');
    }

    function adicionarFaseManual() {
        const nc = parseFloat(document.getElementById('manualCredit').value);
        if(!isNaN(nc)){ adicionarFaseDados(nc, fases[0].prazo); document.getElementById('manualCredit').value = ''; }
    }

    function removerUltimaFase() { if(fases.length > 1) { fases.pop(); renderizarFases(); } }

    function adicionarFaseDados(credito, prazo) {
        const entrada = credito * 0.50;
        fases.push({ numero: fases.length + 1, credito, entrada, parcela: calcularPMT(credito - entrada, prazo, taxaJuros), taxa: credito * percentualTaxa, liquido: credito - entrada, prazo });
        renderizarFases();
    }

    function renderizarFases() {
        const container = document.getElementById('fasesContainer'); container.innerHTML = '';
        let sParc = 0, sTax = 0;
        fases.forEach((f, i) => {
            sParc += f.parcela; sTax += f.taxa;
            const card = document.createElement('div'); card.className = 'fase-card';
            card.innerHTML = `<div class="fase-title">${f.numero}°Fase</div>
                <table><thead><tr><th>Créditos</th><th>Entrada</th><th>Prazo</th><th>Parcela</th><th>Taxa Transf.</th></tr></thead>
                <tbody><tr><td>R$ ${formatarMoeda(f.credito)}</td><td>R$ ${formatarMoeda(f.entrada)}</td><td>${f.prazo}</td><td>R$ ${formatarMoeda(f.parcela)}</td><td>R$ ${formatarMoeda(f.taxa)}</td></tr></tbody></table>
                <div class="liquido-container">
                    <span class="liquido-label">*Valor liquido para utilizar R$</span>
                    <input type="text" class="net-value-input" value="${formatarMoeda(f.liquido)}" onchange="atualizarLiquido(${i}, this.value)">
                </div>`;
            container.appendChild(card);
        });
        document.getElementById('totalCredit').innerText = "R$ " + formatarMoeda(fases[fases.length - 1].liquido);
        document.getElementById('totalInstallment').innerText = "R$ " + formatarMoeda(sParc);
        document.getElementById('totalFees').innerText = "R$ " + formatarMoeda(sTax);
    }

    function atualizarLiquido(idx, val) {
        const n = parseFloat(val.replace(/\./g, '').replace(',', '.'));
        if (!isNaN(n)) { fases[idx].liquido = n; renderizarFases(); }
    }
</script>
</body>
</html>
